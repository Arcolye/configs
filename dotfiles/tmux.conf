unbind C-b
set -g prefix C-a

set -g mouse on

set -g extended-keys on
set -g history-limit 10000

set -g base-index 1
set -g pane-base-index 1

# Status Style
set -g status-style 'bg=colour236'
set -g window-status-style 'bg=colour237,fg=colour250'
set -g window-status-format ' #[fg=colour208]#I #[fg=colour250]#W '
set -g window-status-current-format ' #W#{?window_zoomed_flag,+,} '
set -g window-status-current-style 'bg=colour208,fg=colour236'

set -g status-right '#(whoami)@#H'

bind a last-window
bind C-a last-window
bind , command-prompt -p "rename-window:" "rename-window '%%'"

# Open new panes in the current pane's working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
